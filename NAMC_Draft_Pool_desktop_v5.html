<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NAMC Draft Pool</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--red:#E10600;--blue:#0B3D6B;--black:#111111;--grey:#555555;--mgrey:#CCCCCC;--lgrey:#EEEEEE;--white:#FFFFFF;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--white);color:var(--black);font-family:'Barlow',sans-serif;}
.container{max-width:1200px;margin:0 auto;padding:40px 20px;text-align:center;}
.nav-back{display:inline-block;margin-bottom:20px;}
.nav-back button{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--white);background:var(--red);padding:12px 22px;border:none;cursor:pointer;}
.nav-back button:hover{background:var(--blue);}
h1{font-family:'Bebas Neue',sans-serif;font-size:72px;letter-spacing:3px;color:var(--black);margin-bottom:10px;line-height:0.9;}
h1 span{color:var(--red);}
.subtitle{font-family:'Barlow Condensed',sans-serif;font-size:14px;color:var(--grey);letter-spacing:2px;margin-bottom:40px;}
.under-construction{font-size:48px;margin:40px 0 10px;}
.content-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin-top:40px;}
.placeholder-box{background:var(--lgrey);border:2px dashed var(--mgrey);border-radius:8px;overflow:hidden;}
.placeholder-box img{width:100%;height:220px;object-fit:cover;display:block;}
.placeholder-box p{font-family:'Barlow Condensed',sans-serif;color:var(--grey);font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:10px;}
</style>
</head>
<body>
<div class="container">
  <div class="nav-back">
    <button onclick="location.href='NAMC_Website_v6_3.html'">&larr; Back to NAMC</button>
  </div>

  <h1>NAMC <span>Draft</span><br>Pool</h1>
  <p class="subtitle">COMING SOON</p>

  <div class="under-construction">&#127959;</div>
  <p style="font-size:18px;color:var(--grey);">This page is Under Construction</p>
  <p style="font-size:14px;color:var(--grey);margin-top:10px;">We're building the Draft Pool with rider rankings. Check back soon!</p>

  <div class="content-grid">
    <div class="placeholder-box">
      <img src="https://picsum.photos/seed/namcdraft1/600/400" alt="Draft placeholder">
      <p>Image Placeholder</p>
    </div>
    <div class="placeholder-box">
      <img src="https://picsum.photos/seed/namcdraft2/600/400" alt="Draft placeholder">
      <p>Image Placeholder</p>
    </div>
    <div class="placeholder-box">
      <img src="https://picsum.photos/seed/namcdraft3/600/400" alt="Draft placeholder">
      <p>Image Placeholder</p>
    </div>
  </div>
</div>
</body>
</html>
